[Hotkey]
; Hold this virtual key (decimal) to show the wheel.
; Default 192 = VK_OEM_3 (US `~). Examples: 84=T, 81=Q.
VK=192
; Modifiers: 0=none, 1=Alt, 2=Ctrl, 4=Shift (add to combine).
Mod=0

[Behavior]
; 1 = after choosing a slice, restore the previous window and send Ctrl+V automatically.
; 0 = only update the clipboard.
AutoPaste=1
